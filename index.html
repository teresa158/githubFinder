<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitFinder</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body>

  <!-- ======== NAVBAR ======== -->
  <nav>
    <div id="navbar-container">
      <a href="#" class="logo">
        <img
          src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg"
          alt="logo"
          class="logo-img"
          style="filter:invert(1);"
        />
        <span class="logo-text">GitFinder</span>
      </a>

      <ul class="nav-list">
  <li><a href="#" id="favorits">Favorites (0)</a></li>
</ul>

      <div class="side-nav"></div>
    </div>
  </nav>

  <!-- ======== MAIN ======== -->
  <main>

    <!-- Hero / Search -->
    <section class="en-tete">
      <h1>Explore GitHub Profiles</h1>
      <p>Search any GitHub username to view their profile, stats, and top repositories.</p>

      <div class="search">
        <input
          id="search"
          type="text"
          placeholder="Search GitHub username..."
          autocomplete="off"
          spellcheck="false"
        />
        <button id="search-btn">Search</button>
      </div>
    </section>

    <!-- Dashboard -->
    <div id="dashboard">

      <!-- Welcome state -->
      <div id="welcomestate">
        <img
          src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg"
          alt="search"
          class="search-icon"
        />
        <h2>Search for a user</h2>
        <p>Enter a GitHub username above to get started.</p>
      </div>

      <!-- Loading state -->
      <div id="loading">Loading...</div>

      <!-- Error state -->
      <div id="error"></div>

      <!-- User profile section -->
      <section id="user-profile">
        <div class="profile-row">
          <!-- Profile card -->
          <div id="profil"></div>

          <!-- Stats + repos -->
          <div style="display:flex; flex-direction:column; gap:20px;">
            <div id="f-container"></div>
            <div id="reposities"></div>
          </div>
        </div>
      </section>

      <!-- Favorites section -->
      <section id="Favorites"></section>

    </div>
  </main>

  <!-- ======== FOOTER ======== -->
  <footer>
    <p>GitFinder &mdash; Built with the GitHub API</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
